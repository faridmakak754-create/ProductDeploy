<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>FDD Store</title>
</head>

<body class="bg-gray-50">



    <div id="header"></div>
    <section id="productDetails"
        class=" max-w-5xl mx-auto p-6 max-sm:p-2 grid grid-cols-2 max-[900px]:grid-cols-1 gap-6 border border-gray-200  my-8 rounded-lg bg-white shadow-sm max-[900px]:max-w-xl">

    </section>
    <div id="footer"></div>
    <script src="main.js"></script>


    <script>

        function increase() {
            const number = document.getElementById("number");
            const current = parseInt(number.value);

            if (current < 10) {
                number.value = current + 1;

            }

        }
        function decrease() {
            const number = document.getElementById("number")
            const current = parseInt(number.value);

            if (current > 0) {
                number.value = current - 1;

            }

        }





        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

       
        

        async function loadProduct() {

            try {

               const res = await fetch(`http://localhost:8080/Product/api/products?id=${id}`);
                const product = await res.json();

                document.getElementById("productDetails").innerHTML = `

        <div class="">
            <img class="h-96 w-106 rounded-lg max-[900px]:w-full "
                src="${product.image}"
                alt="">
            <!-- below -->
            <div class="py-6 grid gap-2 ">
                <p class="text-lg text-gray-400 font-semibold">Made In ${product.madeIn}</p>
            </div>
        </div>
        <!-- right -->
        <div class="shadow-sm shadow-gray-200 p-6 space-y-2 rounded-md ">
            <div class="flex justify-between items-center gap-3">
                <p class="bg-blue-300 p-1 rounded-md text-white font-semibold font-mono max-sm:text-sm">In Stock</p>
                <p class="font-semibold  max-sm:text-sm "><i class="fa-solid fa-star text-yellow-400"></i>${product.rating} <span
                        class="text-gray-400 ">(21 reviews)</span>
                </p>
            </div>
            <h1 class="text-2xl font-semibold max-sm:text-lg">${product.title}</h1>

            <p class="text-gray-500 font-semibold max-sm:text-sm">${product.category}</p>
            <div class="flex gap-4">

                <p class="text-red-500 font-semibold text-lg max-sm:text-base">- ${product.discount}%</p>
                <p class=" font-semibold text-lg max-sm:text-base ">₹ ${product.price}</p>
            </div>
            <p class="italic text-gray-600 my-6 max-sm:text-sm">${product.description}
            </p>


            <div class="flex items-center gap-2 py-3">
                <span class="font-semibold">Quantity :</span>
                <button onclick="decrease()" class="h-6 w-6 rounded-full bg-gray-100 ">
                    <i class="fa-solid fa-minus"></i>
                </button>
                <input id="number" type="text" value="0" readonly
                    class="bg-transparent text-center font-semibold w-14 outline-none ">
                <button onclick="increase()" class="h-6 w-6 rounded-full bg-gray-100 ">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>

            <div class="grid gap-2">
                <button class="bg-white border p-2 rounded-full font-semibold border-gray-200 cursor-pointer ">Add to
                    Cart </button>
                <button class="bg-blue-400 border  p-2 rounded-full font-semibold text-white cursor-pointer ">Buy
                    Now</button>
            </div>

            <div class="flex  items-center gap-3 mt-10">
                <span>Share :</span>
                <i class="fa-brands fa-facebook text-blue-600 cursor-pointer"></i>
                <i class="fa-brands fa-whatsapp text-green-500 font-semibold cursor-pointer"></i>
                <i class="fa-brands fa-instagram text-pink-500 cursor-pointer"></i>
                <i class="fa-brands fa-x-twitter cursor-pointer"></i>

            </div>

        </div>

        
      
        `;

            }
            catch (err) {

                console.log(err);

            }
        }

if (id) {
            loadProduct();
        }

    </script>
</body>

</html>
