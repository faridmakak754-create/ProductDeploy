<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDD Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="profile.jpg" type="image/jpg">

    <style>
        @layer utilities {
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }

            .no-scrollbar {
                -ms-overflow-style: none;
                /* IE and Edge */
                scrollbar-width: none;
                /* Firefox */
            }
        }
    </style>
</head>


<body class="bg-gray-50">


    <div id="header"></div>
    <!-- upload -->
    <section class="max-w-4xl mx-auto my-10  bg-gradient-to-br rounded-lg shadow-sm bg-white border border-gray-200 ">
        <h1 class="text-center py-4 font-semibold text-2xl">Upload Your Item</h1>
        <div id="display">

        </div>
        <form onsubmit="handleSubmit(event)" class="grid grid-cols-2 max-[890px]:grid-cols-1 ">
            <div class="p-6">

                <label for="fileInput" class="flex flex-col items-center justify-around border-2 border-dashed border-blue-400 p-5 rounded-3xl h-80 max-sm:h-60

            ">
                    <i class="fa-solid fa-cloud-arrow-up text-blue-400 text-4xl"></i>
                    <div class="flex flex-col items-center">
                        <p class="font-semibold">Drag and Drop files to upload </p>
                        <p class="font-semibold">or</p>
                    </div>

                    <div class="flex flex-col items-center gap-1">
                        <p class="bg-blue-400 w-24 py-1 rounded-2xl text-white font-semibold text-center ">Browse</p>
                        <p class="text-sm text-gray-600">Supported files: jpg , jpeg , png</p>
                    </div>
                    <p id="fileName" class="text-sm text-green-600 mt-2"></p>
                </label>
                <input id="fileInput" type="file" name="image" required class="hidden">
            </div>

            <!-- right side -->
            <div class="p-6 space-y-2 ">
                <!-- category -->
                <div class=" flex  items-center gap-4 ">
                    <label for="category"
                        class="font-semibold w-28 shrink-0  max-[408px]:w-19 max-[408px]:text-sm ">Category:</label>
                    <div class="relative w-full">
                        <input id="category" type="text" placeholder="Enter Your Category" name="category"
                            class=" bg-white w-full outline-none py-2 px-4  rounded-full italic border  border-gray-400 focus:border-blue-600  max-[500px]:text-sm max-[340px]:px-1">
                        <i
                            class="fa-solid fa-layer-group absolute right-3 top-1/2 -translate-y-1/2  text-blue-400 "></i>
                    </div>

                </div>

                <!-- Title-->
                <div class=" flex  items-center gap-4 relative">
                    <label for="name"
                        class="font-semibold w-28 shrink-0  max-[408px]:w-19 max-[408px]:text-sm ">Title:</label>
                    <div class="relative w-full">
                        <input id="name" type="text" placeholder="Enter Your Tittle" name="title"
                            class=" bg-white w-full outline-none py-2 px-6 rounded-full italic border  border-gray-400 focus:border-blue-600  max-[500px]:text-sm max-[340px]:px-1">
                        <i class=" fa-solid fa-tag absolute right-3 top-1/2 -translate-y-1/2 text-blue-400"></i>
                    </div>

                </div>

                <!-- Price-->
                <div class=" flex  items-center gap-4 relative">
                    <label for="price"
                        class="font-semibold w-28 shrink-0  max-[408px]:w-19 max-[408px]:text-sm">Price:</label>
                    <div class="relative w-full">
                        <input id="price" type="number" placeholder="Enter Your Price" name="price"
                            class=" bg-white w-full outline-none py-2 px-6 rounded-full italic border  border-gray-400 focus:border-blue-600  max-[500px]:text-sm max-[340px]:px-1">
                        <i class=" fa-solid fa-indian-rupee-sign absolute right-2 top-1/2 -translate-y-1/2
                            text-blue-400"></i>
                    </div>

                </div>

                <!-- discount -->
                <div class=" flex  items-center gap-4 relative">
                    <label for="discount"
                        class="font-semibold w-28 shrink-0 max-[408px]:w-19 max-[408px]:text-sm">Discount %: </label>
                    <div class="relative w-full">
                        <input id="discount" type="number" placeholder="Enter Your Discount" name="discount"
                            class=" bg-white w-full outline-none py-2 px-6 rounded-full italic border  border-gray-400 focus:border-blue-600  max-[500px]:text-sm max-[340px]:px-1">
                        <i class=" fa-solid fa-percent absolute right-2 top-1/2 -translate-y-1/2 text-blue-400"></i>
                    </div>

                </div>
                <!-- Rating -->
                <div class=" flex  items-center gap-4 relative">
                    <label for="rating" class="font-semibold w-28 shrink-0  max-[408px]:w-19 max-[408px]:text-sm">Rating
                        :</label>
                    <div class="relative w-full">
                        <input id="rating" type="number" placeholder="Enter Your Rating" name="rating"
                            class=" bg-white w-full outline-none py-2 px-6 rounded-full italic border  border-gray-400 focus:border-blue-600  max-[500px]:text-sm max-[340px]:px-1">
                        <i class=" fa-solid fa-star absolute right-2 top-1/2 -translate-y-1/2 text-blue-400"></i>
                    </div>

                </div>
                <!-- description -->
                <div class=" flex  items-center gap-4 relative">
                    <label for="description"
                        class="font-semibold w-28 shrink-0  max-[408px]:w-19 max-[408px]:text-sm">Description:</label>
                    <div class="relative w-full">

                        <input id="description" type="text" placeholder="Enter Your Description" name="description"
                            class=" bg-white  w-full outline-none py-2 px-6 italic rounded-full border  border-gray-400 focus:border-blue-600  max-[500px]:text-sm max-[340px]:px-1 ">
                        <i class=" fa-solid fa-align-left absolute right-2 top-1/2 -translate-y-1/2 text-blue-400"></i>
                    </div>

                </div>
                <!-- Made In -->
                <div class=" flex  items-center gap-4 relative">
                    <label for="madeIn"
                        class="font-semibold w-28 shrink-0  max-[408px]:w-19 max-[408px]:text-sm">MadeIn:</label>
                    <div class="w-full relative ">
                        <input id="madeIn" type="text" placeholder="Enter Made In Country" name="madeIn"
                            class=" bg-white w-full outline-none py-2 px-4 rounded-full italic border  border-gray-400 focus:border-blue-600   max-[500px]:text-sm max-[340px]:px-1 ">
                        <i
                            class=" fa-solid fa-globe absolute right-2 top-1/2 -translate-y-1/2 text-blue-400  max-[370pxpx]:text-sm "></i>
                    </div>

                </div>

                <div class="flex items-center justify-center max-[890px]:justify-end">
                    <button id="submitBtn" type="submit"
                        class="bg-blue-400 w-60  mt-5 py-2 rounded-md font-semibold text-white cursor-pointer ">
                        <span id="btnText">Submit</span>
                        <i id="spinner" class="fas fa-sync fa-spin   hidden"></i>

                    </button>
                </div>


            </div>
        </form>

    </section>

    <!-- recently added Product -->
    <section class="bg-gray-200">
        <div class="max-w-[90%] mx-auto py-16 max-md:py-8">
            <h1 class="text-xl font-semibold pb-6">Recently Added Products</h1>
            <div id="myProduct" class="flex gap-3 overflow-x-scroll no-scrollbar">

               


            </div>
    </section>
    <div id="footer"></div>
    <script src="main.js"></script>
    <script>

        // check login using token
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "login.html";
        }

        // Handle file drag and input
        const box = document.querySelector("label[for='fileInput']");
        const input = document.getElementById("fileInput");
        const text = document.getElementById("fileName");

        box.ondragover = e => e.preventDefault();

        box.ondrop = e => {
            e.preventDefault();
            input.files = e.dataTransfer.files;
            text.textContent = input.files[0].name;
        };

        input.onchange = () => {
            if (input.files.length > 0) {
                text.textContent = input.files[0].name;
            }
        };


        // Handle form submit
        async function handleSubmit(e) {

            e.preventDefault();

            const display = document.getElementById("display");
            const spinner = document.getElementById("spinner");
            const btnText = document.getElementById("btnText");
            const submitBtn = document.getElementById("submitBtn");

            const file = e.target.image.files[0];

            if (!file) {
                display.innerHTML = `<p class="text-red-500 text-center">Please select an image</p>`;
                return;
            }

            // loading
            spinner.classList.remove("hidden");
            btnText.textContent = "Processing...";
            submitBtn.disabled = true;

            const reader = new FileReader();

            reader.onload = async function () {

                const uploadProducts = {
                    category: e.target.category.value,
                    title: e.target.title.value,
                    price: parseFloat(e.target.price.value),
                    discount: parseFloat(e.target.discount.value),
                    rating: parseFloat(e.target.rating.value),
                    description: e.target.description.value,
                    madeIn: e.target.madeIn.value,
                    image: reader.result
                };

                try {

                    const res = await fetch("http://localhost:8080/Product/api/products", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Bearer " + token
                        },
                        body: JSON.stringify(uploadProducts)
                    });
                    
                    e.target.reset();
                    let data;

                    try {
                        data = await res.json();
                    } catch (err) {
                        const text = await res.text();
                        console.error("Server returned non-JSON:", text);
                        display.innerHTML = `<p class="text-red-500 text-center">Server returned invalid JSON</p>`;
                        return;
                    }

                    if (res.ok) {
                        display.innerHTML = `<p class="text-green-500 text-center">${data.message || "Success"}</p>`;
                        loadProducts();
                    } else {
                        display.innerHTML = `<p class="text-red-500 text-center">${data.message || "Failed"}</p>`;
                    }

                } catch (error) {

                    console.error(error);
                    display.innerHTML = `<p class="text-red-500 text-center">Server connection failed</p>`;

                } finally {
                    spinner.classList.add("hidden");
                    btnText.textContent = "Submit";
                    submitBtn.disabled = false;
                    e.target.value.reset();
                    
                }

            };

            reader.readAsDataURL(file);
         
     
          
        }
        
     loadProducts();

        // fetch product 

        async  function loadProducts(){
            const myProduct =document.getElementById("myProduct");

           try {
            const res =await fetch ("http://localhost:8080/Product/api/my-products",{
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });
            const data =await res.json();
            myProduct.innerHTML ="";

            data.forEach(products => {
                myProduct.innerHTML +=`
                 <div class=" p-2 bg-white min-w-64 max-w-64 rounded-[14px] shadow-sm">
                        <!-- img part -->
                        <div class="relative pb-4">
                            <img class="w-full h-40 rounded-[6px] object-cover "
                                src="${products.image}"
                                alt="">
                            <div
                                class="absolute top-2 left-2 text-white bg-red-500 h-8 w-14 rounded-sm flex items-center justify-center text-sm font-semibold">
                                -${products.discount}%</div>
                            <button
                                class="absolute top-2 right-2 h-10 w-10 rounded-full bg-white flex items-center justify-center">
                                <i class="far fa-heart text-gray-600"></i>
                            </button>
                        </div>
                        <div class="flex flex-col gap-2 px-3 ">
                           <div class="flex items-center gap-2">
                                <h1 class="text-lg font-semibold truncate flex-1 min-w-0">
                                    ${products.title}
                                </h1>

                                <p class="font-semibold whitespace-nowrap">
                                    ${products.rating}
                                    <i class="fa-solid fa-star text-yellow-400"></i>
                                </p>
                            </div>
                           <p class="text-sm text-gray-500 font-semibold line-clamp-2  min-h-10">
                                ${products.description}
                            </p>

                            
                            <div class="flex items-center gap-3">
                                <p class="text-xl font-bold">${products.price}</p>
                               
                            </div>
                           <button onclick="viewProduct(${products.id})"
                                class="bg-blue-800 py-1.5 text-white font-semibold rounded-md my-3">
                                View Details
                            </button>
                        </div>
                    </div>


                `;

                
            });


          
            
           }
           catch(error){

            console.log(error);
            myProduct.innerHTML ='<p class="text-red-500">Load failed</p>'
            
           }
        }

        
     function viewProduct(id){

    window.location.href = "productdetails.html?id=" + id;

    }




    </script>
</body>

</html>
