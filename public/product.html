<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDD Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   
</head>
<style>
    @layer utilities {
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    }
</style>

<body>



<div id="header"></div>
    <!-- recently added Product -->
    <section class="bg-white">
        <div class="max-w-[90%] mx-auto pb-16 pt-24 max-md:py-8">
            <h1 class="text-xl font-semibold pb-6">Recently Added Products</h1>
            <div id="recentlyProduct" class="flex gap-3 overflow-x-scroll no-scrollbar">

                <!-- render -->


            </div>
    </section>

    <!-- mobile -->
    <section id="sports" class="bg-blue-50">
        <div class="max-w-[90%] mx-auto pb-16 pt-24 max-md:py-10">
            <div class="flex items-center justify-between mb-5">
                <h1 class="text-2xl font-semibold  max-sm:text-xl ">Choose Your Favourite</h1>
                <!-- <a href=" #" class="text-blue-900 font-semibold text-lg ml-1 max-sm:text-sm ">
                    View All
                    <i class="fas fa-arrow-right"></i>
                </a> -->
            </div>

            <div id="myProducts"
                class="grid grid-cols-4 gap-2 gap-y-5 max-xl:grid-cols-3 max-lg:grid-cols-2 max-sm:grid-cols-1">

            </div>
    </section>

    


   

<div id="footer"></div>
<script src="main.js"></script>


    <script>
        
     
        const myProducts =document.getElementById("myProducts");
        const recentlyProduct =document.getElementById("recentlyProduct");

        async function getAllProduct() {
      try {      
            const res =await fetch ("http://localhost:8080/Product/api/products")
            const data =await res.json();
      
        

        let html1 ="";
        let html2 ="";

        data.forEach(products => {

            // all product display
            html1 +=`
            
            
                    <div
                        class=" p-2 bg-white  rounded-[14px]  shadow-sm hover:-translate-y-1 transition-all hover:shadow-lg">
                        <!-- img part -->
                        <div class="relative pb-4">
                            <img class="w-full h-48 object-cover rounded-[6px] over "
                                src="${products.image}"
                                alt="">
                            <div
                                class="absolute top-2 left-2 text-white bg-red-500 h-8 w-14 rounded-sm flex items-center justify-center text-sm font-semibold">
                        -${products.discount} %
                            </div>
                            <button
                                class="absolute top-2 right-2 h-10 w-10 rounded-full bg-white flex items-center justify-center">
                                <i class="far fa-heart text-gray-600"></i>
                            </button>
                        </div>
                        <!-- details part -->
                        <div class="flex flex-col gap-2 px-3 ">
                            <div class="flex justify-between items-center">
                                <h1 class="text-lg font-semibold">${products.title}</h1>
                                <p class="font-semibold">
                                    ${products.rating}
                                    <i class="fa-solid fa-star text-yellow-400"></i>

                                </p>         
                            </div>
                            <p class="text-sm text-gray-500 font-semibold">
                             ${products.description}
                              
                            </p>
                            <div class="flex items-center gap-3">
                                <p class="text-xl font-bold">₹ ${products.price}</p>
                                
                            </div>
                            <button class="bg-blue-800 py-1 text-white font-semibold rounded-md mb-3">
                                Add to Cart
                            </button>
                        </div>
                    </div>
            
            `;       
        });

        // second dom recently product
        data.slice(0,10).forEach(product =>{
            html2 +=`
                 <div class=" p-2 bg-white min-w-64 rounded-[14px] shadow-sm">
                        <!-- img part -->
                        <div class="relative pb-4">
                            <img class="w-full h-40 rounded-[6px] object-cover "
                                src="${product.image}"
                                alt="">
                            <div
                                class="absolute top-2 left-2 text-white bg-red-500 h-8 w-14 rounded-sm flex items-center justify-center text-sm font-semibold">
                                -${product.discount}%</div>
                            <button
                                class="absolute top-2 right-2 h-10 w-10 rounded-full bg-white flex items-center justify-center">
                                <i class="far fa-heart text-gray-600"></i>
                            </button>
                        </div>
                        <div class="flex flex-col gap-2 px-3 ">
                            <div class="flex justify-between items-center">
                                <h1 class="text-lg font-semibold">${product.title}</h1>
                                <p class="font-semibold">
                                    ${product.rating}
                                    <i class="fa-solid fa-star text-yellow-400"></i>

                                </p>         
                            </div>
                            <p class="text-sm text-gray-500 font-semibold">
                              ${product.description}
                              
                            </p>
                            <div class="flex items-center gap-3">
                                <p class="text-xl font-bold">${product.price}</p>
                               
                            </div>
                            <button class="bg-blue-800 py-1 text-white font-semibold rounded-md mb-3">
                                Add to Cart
                            </button>
                        </div>
                    </div>
   
            `;

        } );
   
    
    myProducts.innerHTML =html1;
    recentlyProduct.innerHTML=html2;

    }

    catch(err){
        console.log(err);
        myProducts.innerHTML = `<p class="text-red-500">Load failed</p>
        `;
        
    }
}  
     getAllProduct();

    </script>
</body>

</html>
